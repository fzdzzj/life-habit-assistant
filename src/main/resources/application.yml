spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: life-habit-assistant
  profiles:
    default: dev
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
server:
  error:
    include-message: never
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  health:
    minimum-sleep-minutes: 420
    maximum-sleep-minutes: 540
    minimum-hydration-ml: 1500
    minimum-exercise-minutes: 30
    minimum-diet-score: 3
  drink:
    hydration-ratios:
      WATER: 1.0
      UNSWEETENED_TEA: 0.9
      COFFEE: 0.8
      MILK: 0.8
      JUICE: 0.5
      SUGAR_SWEETENED_DRINK: 0.0
      CARBONATED_SWEET_DRINK: 0.0
      ENERGY_DRINK: 0.0
      ALCOHOL: 0.0
      OTHER: 0.0
    sugary-risk-volume-ml: 500
    carbonated-sweet-risk-volume-ml: 330
    energy-drink-risk-volume-ml: 1
    alcohol-risk-volume-ml: 1
springdoc:
  swagger-ui:
    path: /swagger-ui.html
